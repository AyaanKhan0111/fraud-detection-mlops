name: Fraud Detection CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read
  packages: write

env:
  MLFLOW_TRACKING_URI: sqlite:///mlflow.db
  RECALL_THRESHOLD: "0.85"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/fraud-api:latest

jobs:
  train-evaluate-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run training
        run: python -m src.train

      - name: Run evaluation
        run: python -m src.evaluate

      - name: Gate deployment on recall threshold
        shell: bash
        run: |
          python - <<'PY'
          import json, os, sys

          threshold = float(os.environ["RECALL_THRESHOLD"])
          with open("artifacts/metrics.json", "r", encoding="utf-8") as f:
              metrics = json.load(f)

          recall = float(metrics["recall"])
          print(f"Recall = {recall:.4f}")
          print(f"Threshold = {threshold:.4f}")

          if recall < threshold:
              print("Recall below threshold. Failing pipeline.")
              sys.exit(1)

          print("Recall threshold passed.")
          PY

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME .

      - name: Push Docker image
        run: docker push $IMAGE_NAME

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fraud-artifacts
          path: |
            artifacts/**
            models/**
            mlflow.db